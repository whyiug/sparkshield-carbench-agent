name: Runtime Compliance

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  runtime-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Scan production runtime boundary
        run: python scripts/check_runtime_compliance.py

      - name: Validate submission template
        run: python scripts/validate_submission.py submission/scenario.toml

      - name: Test compliance controls
        run: python -m unittest discover -s tests/compliance -p 'test_*.py' -v
