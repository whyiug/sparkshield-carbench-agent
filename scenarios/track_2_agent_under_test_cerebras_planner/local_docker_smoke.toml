# Local Docker smoke scenario for the Track 2 Cerebras planner/executor agent.
# Generate with:
#   uv run python generate_compose.py --scenario scenarios/track_2_agent_under_test_cerebras_planner/local_docker_smoke.toml

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
build = { context = ".", dockerfile = "src/track_2_agent_under_test_cerebras_planner/Dockerfile.track-2-agent-under-test-cerebras-planner" }
env = { CEREBRAS_API_KEY = "${CEREBRAS_API_KEY:?Set CEREBRAS_API_KEY in .env}", TRACK2_PLANNER_MODEL = "${TRACK2_PLANNER_MODEL:-gpt-oss-120b}", TRACK2_PLANNER_REASONING_EFFORT = "${TRACK2_PLANNER_REASONING_EFFORT:-high}", TRACK2_EXECUTOR_MODEL = "${TRACK2_EXECUTOR_MODEL:-gpt-oss-120b}", TRACK2_EXECUTOR_REASONING_EFFORT = "${TRACK2_EXECUTOR_REASONING_EFFORT:-medium}", TRACK2_CEREBRAS_SERVICE_TIER = "${TRACK2_CEREBRAS_SERVICE_TIER:-}", TRACK2_PLANNER_MAX_COMPLETION_TOKENS = "${TRACK2_PLANNER_MAX_COMPLETION_TOKENS:-4096}", TRACK2_PLANNER_TEMPERATURE = "${TRACK2_PLANNER_TEMPERATURE:-}", TRACK2_MAX_COMPLETION_TOKENS = "${TRACK2_MAX_COMPLETION_TOKENS:-1024}", TRACK2_TEMPERATURE = "${TRACK2_TEMPERATURE:-}", TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS:-60}", TRACK2_CEREBRAS_QUEUE_BACKOFF_INITIAL_JITTER_RATIO = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_INITIAL_JITTER_RATIO:-0.1}", TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MIN_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MIN_SECONDS:-90}", TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MAX_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MAX_SECONDS:-120}", TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MIN_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MIN_SECONDS:-180}", TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MAX_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MAX_SECONDS:-300}", TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS = "${TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS:-1}", CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR = "${CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR:-/tmp/car-bench-rate-limit-reports}", TRACK2_LLM_MALFORMED_RETRIES = "${TRACK2_LLM_MALFORMED_RETRIES:-1}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
max_steps = 50
