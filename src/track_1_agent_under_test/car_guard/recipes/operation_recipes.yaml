  - id: navigation_create
    domain: navigation_create
    intent_patterns: [create_navigation, start_navigation, set_new_navigation, navigate_to]
    read_operations:
      - semantic_operation: read_current_navigation_for_create
        tool_names: [get_current_navigation_state]
        fixed_arguments: {detailed_information: true}
      - semantic_operation: resolve_location
        tool_names: [get_location_id_by_location_name]
        parameter_mapping: {location: location}
        required_semantic_parameters: [location]
      - semantic_operation: find_routes
        tool_names: [get_routes_from_start_to_destination]
        parameter_mapping: {start_id: start_id, destination_id: destination_id}
        required_semantic_parameters: [start_id, destination_id]
    write_operations:
      - semantic_operation: set_new_navigation
        tool_names: [set_new_navigation]
        parameter_mapping: {route_ids: route_ids}
        required_semantic_parameters: [route_ids]
    evidence_needs:
      - proposition: current_navigation_state
        read_operation: read_current_navigation_for_create
      - proposition: resolved_navigation_location_id
        read_operation: resolve_location
      - proposition: route_options
        read_operation: find_routes
    parameter_derivations: [location_ids_then_route_ids]
    policy_hooks: [POL-016, POL-018, POL-021, POL-022]
    parallel_read_groups: []
    write_order: [set_new_navigation]
    completion_evidence: [active_navigation]
    primary_operation: set_new_navigation

