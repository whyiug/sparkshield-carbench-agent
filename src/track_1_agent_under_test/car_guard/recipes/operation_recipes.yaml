        tool_names: [set_climate_temperature]
        parameter_mapping: {temperature: temperature, seat_zone: seat_zone}
        required_semantic_parameters: [temperature, seat_zone]
    evidence_needs: []
    parameter_derivations: [temperature_and_zone_from_explicit_user_request, relative_temperature_from_current_zone_settings]
    policy_hooks: [POL-012]
    parallel_read_groups: []
    write_order: [set_climate_temperature]
    completion_evidence: [climate_temperature_state]
    primary_operation: set_climate_temperature

