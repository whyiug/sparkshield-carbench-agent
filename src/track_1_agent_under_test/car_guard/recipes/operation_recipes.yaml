  - id: navigation_add_waypoint
    domain: navigation_edit
    intent_patterns: [add_navigation_waypoint, navigation_add_one_waypoint]
    read_operations:
      - semantic_operation: read_current_navigation
        tool_names: [get_current_navigation_state]
        fixed_arguments: {detailed_information: true}
      - semantic_operation: resolve_added_waypoint_location
        tool_names: [get_location_id_by_location_name]
        parameter_mapping: {new_waypoint_name: location}
        required_semantic_parameters: [new_waypoint_name]
      - semantic_operation: find_route_to_added_waypoint
        tool_names: [get_routes_from_start_to_destination]
        parameter_mapping:
          previous_waypoint_id: start_id
          new_waypoint_id: destination_id
        required_semantic_parameters: [previous_waypoint_id, new_waypoint_id]
      - semantic_operation: find_route_from_added_waypoint
        tool_names: [get_routes_from_start_to_destination]
        parameter_mapping:
          new_waypoint_id: start_id
          next_waypoint_id: destination_id
        required_semantic_parameters: [new_waypoint_id, next_waypoint_id]
    write_operations:
      - semantic_operation: navigation_add_one_waypoint
        tool_names: [navigation_add_one_waypoint]
        parameter_mapping:
          new_waypoint_id: waypoint_id_to_add
          previous_waypoint_id: waypoint_id_before_new_waypoint
          next_waypoint_id: waypoint_id_after_new_waypoint
          route_id_leading_to_waypoint: route_id_leading_to_new_waypoint
          route_id_leading_away_from_waypoint: route_id_leading_away_from_new_waypoint
        required_semantic_parameters: [new_waypoint_id, previous_waypoint_id, route_id_leading_to_waypoint]
    evidence_needs:
      - proposition: current_navigation_state
        read_operation: read_current_navigation
      - proposition: resolved_navigation_location_id
        read_operation: resolve_added_waypoint_location
      - proposition: route_to_replacement_options
        read_operation: find_route_to_added_waypoint
      - proposition: route_from_replacement_options
        read_operation: find_route_from_added_waypoint
        required_before_set: false
    parameter_derivations: [added_waypoint_and_routes_from_current_navigation]
    policy_hooks: [POL-017, POL-018]
    parallel_read_groups: []
    write_order: [navigation_add_one_waypoint]
    completion_evidence: [active_navigation]
    primary_operation: navigation_add_one_waypoint

  - id: navigation_replace_waypoint
    domain: navigation_edit
    intent_patterns: [replace_navigation_waypoint, navigation_replace_one_waypoint]
    read_operations:
      - semantic_operation: read_current_navigation
        tool_names: [get_current_navigation_state]
        fixed_arguments: {detailed_information: true}
      - semantic_operation: resolve_replacement_location
        tool_names: [get_location_id_by_location_name]
        parameter_mapping: {new_waypoint_name: location}
        required_semantic_parameters: [new_waypoint_name]
      - semantic_operation: find_route_to_replacement
        tool_names: [get_routes_from_start_to_destination]
        parameter_mapping:
          replacement_previous_waypoint_id: start_id
          replacement_new_waypoint_id: destination_id
        required_semantic_parameters: [replacement_previous_waypoint_id, replacement_new_waypoint_id]
      - semantic_operation: find_route_from_replacement
        tool_names: [get_routes_from_start_to_destination]
        parameter_mapping:
          replacement_new_waypoint_id: start_id
          replacement_next_waypoint_id: destination_id
        required_semantic_parameters: [replacement_new_waypoint_id, replacement_next_waypoint_id]
    write_operations:
      - semantic_operation: navigation_replace_one_waypoint
        tool_names: [navigation_replace_one_waypoint]
        parameter_mapping:
          waypoint_id_to_replace: waypoint_id_to_replace
