schema_version: 1
recipes:
  - id: air_conditioning
    domain: climate
    intent_patterns: [set_air_conditioning, enable_air_conditioning, disable_air_conditioning, control_ac]
    semantic_preconditions: [vehicle_climate_state_observed]
    read_operations:
      - semantic_operation: read_climate_settings
        tool_names: [get_climate_settings]
      - semantic_operation: read_window_positions
        tool_names: [get_vehicle_window_positions]
    write_operations:
      - semantic_operation: set_air_conditioning
        tool_names: [set_air_conditioning]
        parameter_mapping: {enabled: "on"}
        required_semantic_parameters: [enabled]
    evidence_needs:
      - proposition: fan_speed
        read_operation: read_climate_settings
      - proposition: window_driver_position
        read_operation: read_window_positions
      - proposition: window_passenger_position
        read_operation: read_window_positions
      - proposition: window_driver_rear_position
        read_operation: read_window_positions
      - proposition: window_passenger_rear_position
        read_operation: read_window_positions
    parameter_derivations: [enabled_from_explicit_user_request]
    policy_hooks: [POL-011]
    parallel_read_groups: [[read_climate_settings, read_window_positions]]
    write_order:
      - close_driver_window_for_ac
      - close_passenger_window_for_ac
      - close_driver_rear_window_for_ac
      - close_passenger_rear_window_for_ac
      - set_minimum_fan_for_ac
      - set_air_conditioning
    completion_evidence: [air_conditioning_enabled_state]
    conditional_requirements:
      - id: close_driver_window_before_ac
        when: {proposition: window_driver_position, operator: gt, value: 20}
        policy_hook: POL-011
        operation:
          semantic_operation: close_driver_window_for_ac
          tool_names: [open_close_window]
          fixed_arguments: {window: DRIVER, percentage: 0}
      - id: close_passenger_window_before_ac
        when: {proposition: window_passenger_position, operator: gt, value: 20}
        policy_hook: POL-011
        operation:
          semantic_operation: close_passenger_window_for_ac
          tool_names: [open_close_window]
          fixed_arguments: {window: PASSENGER, percentage: 0}
      - id: close_driver_rear_window_before_ac
        when: {proposition: window_driver_rear_position, operator: gt, value: 20}
        policy_hook: POL-011
        operation:
          semantic_operation: close_driver_rear_window_for_ac
          tool_names: [open_close_window]
          fixed_arguments: {window: DRIVER_REAR, percentage: 0}
      - id: close_passenger_rear_window_before_ac
        when: {proposition: window_passenger_rear_position, operator: gt, value: 20}
        policy_hook: POL-011
        operation:
          semantic_operation: close_passenger_rear_window_for_ac
          tool_names: [open_close_window]
          fixed_arguments: {window: PASSENGER_REAR, percentage: 0}
      - id: start_fan_before_ac
        when: {proposition: fan_speed, operator: eq, value: 0}
        policy_hook: POL-011
        operation:
          semantic_operation: set_minimum_fan_for_ac
          tool_names: [set_fan_speed]
          fixed_arguments: {level: 1}
    primary_operation: set_air_conditioning
    on_unavailable: explain_without_internal_names
    terminal_after_success: false

  - id: climate_temperature
    domain: climate
    intent_patterns: [set_climate_temperature, set_cabin_temperature]
    read_operations:
