    evidence_needs:
      - proposition: sunshade_open_percentage
        read_operation: read_sunroof_and_sunshade
      - proposition: weather_allows_sunroof
        acceptable_sources: [tool_result, derived]
    parameter_derivations: [sunroof_percentage_from_intent]
    policy_hooks: [POL-005, POL-008, POL-009]
    parallel_read_groups: []
    write_order: [open_sunshade_for_sunroof, set_sunroof_position]
    completion_evidence: [sunroof_position]
    conditional_requirements:
      - id: open_sunshade_before_sunroof
        when: {proposition: sunshade_open_percentage, operator: lt, value: 100}
        policy_hook: POL-005
        operation:
          semantic_operation: open_sunshade_for_sunroof
          tool_names: [open_close_sunshade]
          fixed_arguments: {percentage: 100}
